  MASTODON_URL: str?
  MASTODON_CLIENT_ID: str?
  MASTODON_CLIENT_SECRET: str?
  DRIBBBLE_CLIENT_ID: str?
  DRIBBBLE_CLIENT_SECRET: str?
  OPENAI_API_KEY: str?
  POSTGRES_PASSWORD: str?
