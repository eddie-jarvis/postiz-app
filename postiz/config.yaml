name: "Postiz - Social Media Manager"
description: "Self-hosted social media scheduling and analytics tool"
version: "1.1.1"
slug: "postiz"
url: "https://github.com/eddie-jarvis/postiz-app"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
host_network: true
ports:
  "5000/tcp": 5000
ports_description:
  "5000/tcp": "Postiz Web UI (nginx)"
map:
  - type: config
    read_only: false
  - type: share
    read_only: false
ingress: false
panel_icon: "mdi:post"
panel_title: "Postiz"
schema:
  JWT_SECRET: str
  MAIN_URL: str?
  DISABLE_REGISTRATION: bool?
  IS_GENERAL: bool?
  X_API_KEY: str?
  X_API_SECRET: str?
  LINKEDIN_CLIENT_ID: str?
  LINKEDIN_CLIENT_SECRET: str?
  REDDIT_CLIENT_ID: str?
  REDDIT_CLIENT_SECRET: str?
  GITHUB_CLIENT_ID: str?
  GITHUB_CLIENT_SECRET: str?
  THREADS_APP_ID: str?
  THREADS_APP_SECRET: str?
  FACEBOOK_APP_ID: str?
  FACEBOOK_APP_SECRET: str?
  YOUTUBE_CLIENT_ID: str?
  YOUTUBE_CLIENT_SECRET: str?
  TIKTOK_CLIENT_ID: str?
  TIKTOK_CLIENT_SECRET: str?
  PINTEREST_CLIENT_ID: str?
  PINTEREST_CLIENT_SECRET: str?
  DISCORD_CLIENT_ID: str?
